<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nyxx/check</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #ff1a2e;
      --red-dim: #8a0e18;
      --red-glow: rgba(255, 26, 46, 0.3);
      --bg: #050304;
      --surface: #0a0607;
      --border: #1a0a0c;
      --text: #a0a0a8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* CRT */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255, 26, 46, 0.012) 2px,
        rgba(255, 26, 46, 0.012) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* Glow border */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      position: relative;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 2.5rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      box-shadow: 0 0 12px var(--red-glow);
      animation: pulseGlow 1.5s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .logo {
      font-size: 1.3rem;
      color: #fff;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-shadow: 0 0 20px var(--red-glow);
    }
    .logo span { color: var(--red); }
    .logo slash { color: #333; }

    .sub {
      font-size: 0.6rem;
      color: #4a0a0a;
      letter-spacing: 0.2em;
      margin-top: 0.3rem;
      text-transform: uppercase;
    }

    .sysinfo {
      text-align: right;
      font-size: 0.6rem;
      color: #3a0a0a;
      line-height: 1.6;
    }
    .sysinfo .dot {
      display: inline-block;
      width: 5px; height: 5px;
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
      margin-right: 4px;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* NOISE OVERLAY */
    .noise {
      position: fixed;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 998;
      opacity: 0.08;
      animation: noiseAnim 0.5s steps(4) infinite;
    }
    @keyframes noiseAnim { 0% { transform: translate(0,0); } 25% { transform: translate(-5%,-5%); } 50% { transform: translate(5%,2%); } 75% { transform: translate(-2%,5%); } }

    /* FORM */
    .add-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .add-form input {
      background: var(--surface);
      border: 1px solid #1a0808;
      color: var(--text);
      padding: 0.7rem 0.9rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      transition: all 0.2s;
    }
    .add-form input:focus {
      border-color: var(--red);
      box-shadow: 0 0 8px var(--red-glow);
    }
    .add-form input::placeholder { color: #1a0a0a; }
    .add-form input[type="text"] { flex: 1; min-width: 120px; }
    .add-form input[type="url"] { flex: 2; min-width: 200px; }
    .add-form button {
      background: var(--surface);
      border: 1px solid #1a0808;
      color: var(--red);
      padding: 0.7rem 1.4rem;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
      text-shadow: 0 0 4px var(--red-glow);
    }
    .add-form button:hover {
      background: #0f0505;
      border-color: var(--red);
      box-shadow: 0 0 12px var(--red-glow), inset 0 0 12px transparent;
    }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid #120808;
      margin-bottom: 0.4rem;
      position: relative;
      transition: border 0.2s;
    }
    .card:hover { border-color: #2a0a0a; }

    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      transition: all 0.3s;
    }
    .card.up::before { background: var(--red); box-shadow: 0 0 8px var(--red-glow); }
    .card.down::before { background: #ff4400; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.9rem 1.2rem 0.9rem 1.4rem;
      cursor: pointer;
      min-height: 48px;
    }

    .card-info { min-width: 0; flex: 1; }
    .card-name {
      color: #ccc;
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .card-url {
      color: #1a0a0a;
      font-size: 0.6rem;
      margin-top: 0.15rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card:hover .card-url { color: #2a0a0a; }

    .card-right {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
      margin-left: 1rem;
    }
    .card-metrics { text-align: right; }
    .card-metrics .ms { font-size: 0.75rem; color: #3a0a0a; }
    .card-metrics .time {
      font-size: 0.55rem;
      color: #1a0505;
      display: block;
      margin-top: 0.1rem;
    }

    .card-body {
      display: none;
      padding: 0 1.2rem 1rem 1.4rem;
    }
    .card-body.open { display: block; }

    .card-toolbar {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.6rem;
    }
    .card-toolbar button {
      background: none;
      border: none;
      color: #1a0808;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      cursor: pointer;
      padding: 0;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .card-toolbar button:hover { color: var(--red); text-shadow: 0 0 6px var(--red-glow); }

    canvas {
      width: 100%;
      height: 80px;
      background: #050304;
      border: 1px solid #120808;
    }

    .empty {
      color: #1a0808;
      text-align: center;
      padding: 5rem 0;
      font-size: 0.8rem;
    }
    .empty .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--red-dim);
      box-shadow: 0 0 6px var(--red-glow);
      margin-left: 4px;
      vertical-align: middle;
      animation: cursorBlink 1s step-end infinite;
    }
    @keyframes cursorBlink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #0a0505;
      border: 1px solid #1a0808;
      color: var(--red);
      padding: 0.5rem 1rem;
      font-size: 0.65rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
      text-shadow: 0 0 4px var(--red-glow);
    }
    .toast.show { opacity: 1; box-shadow: 0 0 12px var(--red-glow); }

    /* GLITCH SCATTER */
    .glitch-line {
      position: fixed;
      left: 0; width: 100%;
      height: 2px;
      background: var(--red);
      opacity: 0;
      pointer-events: none;
      z-index: 997;
      animation: glitchLine 4s infinite;
    }
    .glitch-line:nth-child(1) { top: 20%; animation-delay: 0s; }
    .glitch-line:nth-child(2) { top: 65%; animation-delay: 1.3s; }
    .glitch-line:nth-child(3) { top: 40%; animation-delay: 2.7s; }
    .glitch-line:nth-child(4) { top: 80%; animation-delay: 3.4s; }
    @keyframes glitchLine {
      0%, 90%, 100% { opacity: 0; }
      92% { opacity: 0; }
      93% { opacity: 0.6; }
      94% { opacity: 0; }
      96% { opacity: 0.3; }
      97% { opacity: 0; }
    }

    @media (max-width: 500px) {
      .container { padding: 1.5rem 1rem; }
      .add-form input { min-width: 100% !important; }
      .header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      .sysinfo { text-align: left; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="glitch-line"></div>
  <div class="glitch-line"></div>
  <div class="glitch-line"></div>
  <div class="glitch-line"></div>

  <div class="container">
    <div class="header">
      <div>
        <div class="logo">nyxx<slash>/</slash><span>check</span></div>
        <div class="sub">uptime surveillance // system ready</div>
      </div>
      <div class="sysinfo">
        <span class="dot"></span> ACTIVE<br>
        <span id="targetCount">0</span> TARGETS
      </div>
    </div>

    <form class="add-form" id="addForm">
      <input type="text" id="nameInput" placeholder="label" required>
      <input type="url" id="urlInput" placeholder="https://target" required>
      <button type="submit">+ TRACK</button>
    </form>

    <div id="list"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = window.location.origin
    const historyCache = {}
    let toastTimer

    function fmtTime(ts) {
      if (!ts) return ''
      if (ts._seconds) return new Date(ts._seconds * 1000).toLocaleTimeString()
      if (ts.seconds) return new Date(ts.seconds * 1000).toLocaleTimeString()
      return new Date(ts).toLocaleTimeString()
    }

    function showToast(msg) {
      const el = document.getElementById('toast')
      el.textContent = '> ' + msg
      el.classList.add('show')
      clearTimeout(toastTimer)
      toastTimer = setTimeout(() => el.classList.remove('show'), 2000)
    }

    async function load() {
      const res = await fetch(`${API}/api/checks`)
      if (!res.ok) { showToast('connection lost'); return }
      const urls = await res.json()
      document.getElementById('targetCount').textContent = urls.length

      const list = document.getElementById('list')
      if (urls.length === 0) {
        list.innerHTML = '<div class="empty">awaiting targets<span class="cursor"></span></div>'
        return
      }

      const fetches = urls.map(async u => {
        if (!historyCache[u.id]) {
          const hRes = await fetch(`${API}/api/checks/${u.id}/history`)
          historyCache[u.id] = hRes.ok ? await hRes.json() : []
        }
      })
      await Promise.allSettled(fetches)

      list.innerHTML = urls.map(u => {
        const h = historyCache[u.id] || []
        const last = h.length > 0 ? h[h.length - 1] : null
        const statusClass = last && last.status >= 200 && last.status < 400 ? 'up' : (last ? 'down' : '')
        return `
          <div class="card ${statusClass}">
            <div class="card-header" onclick="toggle(${u.id})">
              <div class="card-info">
                <div class="card-name">${u.name}</div>
                <div class="card-url">${u.url}</div>
              </div>
              <div class="card-right">
                <div class="card-metrics">
                  <span class="ms">${last ? last.responseTime + 'ms' : '--'}</span>
                  <span class="time">${last ? fmtTime(last.timestamp) : ''}</span>
                </div>
              </div>
            </div>
            <div class="card-body" id="body-${u.id}">
              <div class="card-toolbar">
                <button onclick="removeUrl(${u.id})">[ DELETE ]</button>
                <button onclick="refreshHistory(${u.id})">[ REFRESH ]</button>
              </div>
              <canvas id="chart-${u.id}"></canvas>
            </div>
          </div>
        `
      }).join('')

      urls.forEach(u => drawChart(u.id, historyCache[u.id] || []))
    }

    async function refreshHistory(id) {
      delete historyCache[id]
      const hRes = await fetch(`${API}/api/checks/${id}/history`)
      historyCache[id] = hRes.ok ? await hRes.json() : []
      drawChart(id, historyCache[id])
    }

    function drawChart(id, data) {
      const canvas = document.getElementById(`chart-${id}`)
      if (!canvas) return
      const ctx = canvas.getContext('2d')
      const dpr = window.devicePixelRatio || 1
      const rect = canvas.getBoundingClientRect()
      const w = Math.max(rect.width, 100)
      canvas.width = w * dpr
      canvas.height = 80 * dpr
      ctx.scale(dpr, dpr)

      ctx.clearRect(0, 0, w, 80)

      if (data.length < 2) {
        ctx.fillStyle = '#1a0808'
        ctx.font = '9px JetBrains Mono, monospace'
        ctx.textAlign = 'center'
        ctx.fillText('-- no data --', w/2, 44)
        return
      }

      const times = data.map(d => d.responseTime || 0)
      const max = Math.max(...times, 1)
      const barW = Math.min(8, (w - 20) / times.length)
      const gap = Math.min(barW * 0.3, 2)

      ctx.shadowColor = 'rgba(255, 26, 46, 0.3)'
      ctx.shadowBlur = 4
      times.forEach((t, i) => {
        const x = 10 + i * (barW + gap)
        const barH = (t / max) * 60
        const status = data[i].status
        ctx.fillStyle = status >= 200 && status < 400 ? '#ff1a2e' : '#ff4400'
        ctx.globalAlpha = 0.3 + (t / max) * 0.7
        ctx.fillRect(x, 70 - barH, barW, barH)
      })
      ctx.globalAlpha = 1
      ctx.shadowBlur = 0
    }

    function toggle(id) {
      const el = document.getElementById(`body-${id}`)
      el.classList.toggle('open')
      if (el.classList.contains('open')) {
        setTimeout(() => drawChart(id, historyCache[id] || []), 50)
      }
    }

    async function removeUrl(id) {
      const res = await fetch(`${API}/api/checks/${id}`, { method: 'DELETE' })
      if (res.ok) { delete historyCache[id]; showToast('deleted'); load() }
      else showToast('error')
    }

    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const name = document.getElementById('nameInput').value.trim()
      const url = document.getElementById('urlInput').value.trim()
      if (!name || !url) return
      const res = await fetch(`${API}/api/checks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, url })
      })
      if (res.ok) {
        document.getElementById('nameInput').value = ''
        document.getElementById('urlInput').value = ''
        showToast('tracking started')
        load()
      } else showToast('failed')
    })

    load()
    setInterval(load, 15000)
  </script>
</body>
</html>
