<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nyxx/check</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0b0e;
      --surface: #0f1116;
      --border: #1a1d25;
      --text: #b7b9c4;
      --dim: #4a4d5a;
      --faint: #252833;
      --green: #5f8;
      --red: #e34;
      --accent: #7c8aff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* CRT simulation */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,255,0,0.008) 2px,
        rgba(0,255,0,0.008) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      position: relative;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 2.5rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
      opacity: 0.3;
    }

    .logo {
      font-size: 1.3rem;
      color: #fff;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    .logo slash { color: var(--dim); }
    .logo span { color: var(--accent); }

    .sub {
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 0.2em;
      margin-top: 0.3rem;
      text-transform: uppercase;
    }

    .sysinfo {
      text-align: right;
      font-size: 0.6rem;
      color: var(--dim);
      line-height: 1.6;
    }
    .sysinfo .dot {
      display: inline-block;
      width: 5px; height: 5px;
      background: var(--green);
      border-radius: 0;
      margin-right: 4px;
      animation: blink 1.2s infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

    /* FORM */
    .add-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .add-form input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.7rem 0.9rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      transition: border 0.2s;
    }
    .add-form input:focus { border-color: var(--accent); }
    .add-form input::placeholder { color: var(--faint); }
    .add-form input[type="text"] { flex: 1; min-width: 120px; }
    .add-form input[type="url"] { flex: 2; min-width: 200px; }
    .add-form button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 0.7rem 1.4rem;
      font-family: 'Share Tech Mono', monospace;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .add-form button:hover {
      background: #14182a;
      border-color: var(--accent);
    }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 0.4rem;
      position: relative;
      transition: border 0.2s;
    }
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      transition: background 0.3s;
    }
    .card.up::before { background: var(--green); }
    .card.down::before { background: var(--red); }
    .card.pending::before { background: var(--faint); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.9rem 1.2rem 0.9rem 1.4rem;
      cursor: pointer;
      min-height: 48px;
    }

    .card-info { min-width: 0; flex: 1; }
    .card-name {
      color: #fff;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .card-url {
      color: var(--dim);
      font-size: 0.65rem;
      margin-top: 0.15rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-right {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
      margin-left: 1rem;
    }
    .card-metrics {
      text-align: right;
    }
    .card-metrics .ms {
      font-size: 0.75rem;
      color: var(--dim);
    }
    .card-metrics .time {
      font-size: 0.55rem;
      color: var(--faint);
      display: block;
      margin-top: 0.1rem;
    }

    /* CHART / BODY */
    .card-body {
      display: none;
      padding: 0 1.2rem 1rem 1.4rem;
    }
    .card-body.open { display: block; }

    .card-toolbar {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.6rem;
    }
    .card-toolbar button {
      background: none;
      border: none;
      color: var(--faint);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      cursor: pointer;
      padding: 0;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .card-toolbar button:hover { color: var(--red); }

    canvas {
      width: 100%;
      height: 80px;
      background: #08090c;
      border: 1px solid var(--border);
    }

    .empty {
      color: var(--faint);
      text-align: center;
      padding: 5rem 0;
      font-size: 0.8rem;
    }
    .empty .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--dim);
      animation: blink 1s step-end infinite;
      margin-left: 4px;
      vertical-align: middle;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 0.5rem 1rem;
      font-size: 0.65rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 500px) {
      .container { padding: 1.5rem 1rem; }
      .add-form input { min-width: 100% !important; }
      .header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      .sysinfo { text-align: left; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <div class="logo">nyxx<slash>/</slash><span>check</span></div>
        <div class="sub">uptime surveillance</div>
      </div>
      <div class="sysinfo">
        <span class="dot"></span> system online<br>
        watching <span id="targetCount">0</span> targets
      </div>
    </div>

    <form class="add-form" id="addForm">
      <input type="text" id="nameInput" placeholder="label" required>
      <input type="url" id="urlInput" placeholder="https://target" required>
      <button type="submit">+ track</button>
    </form>

    <div id="list"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = window.location.origin
    const historyCache = {}
    let toastTimer, lastUrls = []

    function fmtTime(ts) {
      if (!ts) return ''
      if (ts._seconds) return new Date(ts._seconds * 1000).toLocaleTimeString()
      if (ts.seconds) return new Date(ts.seconds * 1000).toLocaleTimeString()
      return new Date(ts).toLocaleTimeString()
    }

    function showToast(msg) {
      const el = document.getElementById('toast')
      el.textContent = '> ' + msg
      el.classList.add('show')
      clearTimeout(toastTimer)
      toastTimer = setTimeout(() => el.classList.remove('show'), 2000)
    }

    async function load() {
      const res = await fetch(`${API}/api/checks`)
      if (!res.ok) { showToast('connection lost'); return }
      const urls = await res.json()
      lastUrls = urls
      document.getElementById('targetCount').textContent = urls.length

      const list = document.getElementById('list')
      if (urls.length === 0) {
        list.innerHTML = '<div class="empty">awaiting targets<span class="cursor"></span></div>'
        return
      }

      const fetches = urls.map(async u => {
        if (!historyCache[u.id]) {
          const hRes = await fetch(`${API}/api/checks/${u.id}/history`)
          historyCache[u.id] = hRes.ok ? await hRes.json() : []
        }
      })
      await Promise.allSettled(fetches)

      list.innerHTML = urls.map(u => {
        const h = historyCache[u.id] || []
        const last = h.length > 0 ? h[h.length - 1] : null
        const statusClass = last && last.status >= 200 && last.status < 400 ? 'up' : (last ? 'down' : 'pending')
        return `
          <div class="card ${statusClass}" data-id="${u.id}">
            <div class="card-header" onclick="toggle(${u.id})">
              <div class="card-info">
                <div class="card-name">${u.name}</div>
                <div class="card-url">${u.url}</div>
              </div>
              <div class="card-right">
                <div class="card-metrics">
                  <span class="ms">${last ? last.responseTime + 'ms' : '--'}</span>
                  <span class="time">${last ? fmtTime(last.timestamp) : ''}</span>
                </div>
              </div>
            </div>
            <div class="card-body" id="body-${u.id}">
              <div class="card-toolbar">
                <button onclick="removeUrl(${u.id})">[ delete ]</button>
                <button onclick="updateChart(${u.id})">[ refresh ]</button>
              </div>
              <canvas id="chart-${u.id}"></canvas>
            </div>
          </div>
        `
      }).join('')

      urls.forEach(u => drawChart(u.id, historyCache[u.id] || []))
    }

    async function updateChart(id) {
      delete historyCache[id]
      const hRes = await fetch(`${API}/api/checks/${id}/history`)
      historyCache[id] = hRes.ok ? await hRes.json() : []
      drawChart(id, historyCache[id])
    }

    function drawChart(id, data) {
      const canvas = document.getElementById(`chart-${id}`)
      if (!canvas) return
      const ctx = canvas.getContext('2d')
      const dpr = window.devicePixelRatio || 1
      const rect = canvas.getBoundingClientRect()
      const w = Math.max(rect.width, 100)
      canvas.width = w * dpr
      canvas.height = 80 * dpr
      ctx.scale(dpr, dpr)

      ctx.clearRect(0, 0, w, 80)

      if (data.length < 2) {
        ctx.fillStyle = '#252833'
        ctx.font = '9px Share Tech Mono, monospace'
        ctx.textAlign = 'center'
        ctx.fillText('-- no data --', w/2, 44)
        return
      }

      const times = data.map(d => d.responseTime || 0)
      const max = Math.max(...times, 1)
      const barW = Math.min(8, (w - 20) / times.length)
      const gap = Math.min(barW * 0.3, 2)

      times.forEach((t, i) => {
        const x = 10 + i * (barW + gap)
        const barH = (t / max) * 60
        const status = data[i].status
        ctx.fillStyle = status >= 200 && status < 400
          ? '#5f8'
          : '#e34'
        ctx.globalAlpha = 0.4 + (t / max) * 0.6
        ctx.fillRect(x, 70 - barH, barW, barH)
      })
      ctx.globalAlpha = 1
    }

    function toggle(id) {
      const el = document.getElementById(`body-${id}`)
      el.classList.toggle('open')
      if (el.classList.contains('open')) {
        setTimeout(() => drawChart(id, historyCache[id] || []), 50)
      }
    }

    async function removeUrl(id) {
      const res = await fetch(`${API}/api/checks/${id}`, { method: 'DELETE' })
      if (res.ok) { delete historyCache[id]; showToast('deleted'); load() }
      else showToast('error')
    }

    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const name = document.getElementById('nameInput').value.trim()
      const url = document.getElementById('urlInput').value.trim()
      if (!name || !url) return
      const res = await fetch(`${API}/api/checks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, url })
      })
      if (res.ok) {
        document.getElementById('nameInput').value = ''
        document.getElementById('urlInput').value = ''
        showToast('tracking started')
        load()
      } else showToast('failed')
    })

    load()
    setInterval(load, 15000)
  </script>
</body>
</html>
